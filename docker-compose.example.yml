services:
  immich-flickr-sync:
    build: .
    volumes:
      - ./data:/app/data
    environment:
      - IMMICH_API_KEY=${IMMICH_API_KEY}
      - FLICKR_API_KEY=${FLICKR_API_KEY}
      - FLICKR_API_SECRET=${FLICKR_API_SECRET}
      - FLICKR_ACCESS_TOKEN=${FLICKR_ACCESS_TOKEN}
      - FLICKR_ACCESS_TOKEN_SECRET=${FLICKR_ACCESS_TOKEN_SECRET}
    restart: "no"
